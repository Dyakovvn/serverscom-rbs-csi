apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbs-csi-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: rbs-csi-controller
    {{- include "rbs-csi.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbs-csi-controller
  template:
    metadata:
      labels:
        app: rbs-csi-controller
        {{- include "rbs-csi.labels" . | nindent 8 }}
    spec:
      serviceAccountName: rbs-csi-controller-sa
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: csi-provisioner
          image: "{{ .Values.controller.provisioner.image.repository }}:{{ .Values.controller.provisioner.image.tag }}"
          args:
            - "--csi-address=$(ADDRESS)"
            - "--v=2"
            - "--leader-election"
            - "--timeout=10m"
            - "--extra-create-metadata"
            - "--feature-gates=Topology=false"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          {{- with .Values.controller.provisioner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        - name: csi-attacher
          image: "{{ .Values.controller.attacher.image.repository }}:{{ .Values.controller.attacher.image.tag }}"
          args:
            - "--v=2"
            - "--csi-address=$(ADDRESS)"
            - "--leader-election"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          {{- with .Values.controller.attacher.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        - name: csi-resizer
          image: "{{ .Values.controller.resizer.image.repository }}:{{ .Values.controller.resizer.image.tag }}"
          args:
            - "--csi-address=$(ADDRESS)"
            - "--v=2"
            - "--leader-election"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          {{- with .Values.controller.resizer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        - name: rbs-csi-driver
          image: "{{ .Values.controller.driver.image.repository }}:{{ .Values.controller.driver.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controller.driver.image.pullPolicy }}
          command: ["/bin/rbs-csi-controller"]
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--v=2"
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
            - name: SERVERSCOM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbs-csi-secret
                  key: api-url
            - name: SERVERSCOM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rbs-csi-secret
                  key: api-token
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          {{- with .Values.controller.driver.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        - name: socket-dir
          emptyDir: {}
