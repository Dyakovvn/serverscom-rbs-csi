---
# api.token is required; chart fails to render when empty.
api:
  url: "https://api.servers.com/v1"
  token: ""

# Labels merged onto every managed object.
commonLabels: {}

# imagePullSecrets applied to every Pod template.
imagePullSecrets: []

controller:
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
  driver:
    image:
      repository: ghcr.io/serverscom/rbs-csi-driver
      tag: v0.1.4
      pullPolicy: Always
    resources:
      limits:
        memory: 200Mi
        cpu: 100m
      requests:
        memory: 100Mi
        cpu: 50m
  provisioner:
    image:
      repository: registry.k8s.io/sig-storage/csi-provisioner
      tag: v5.3.0
  attacher:
    image:
      repository: registry.k8s.io/sig-storage/csi-attacher
      tag: v4.10.0
  resizer:
    image:
      repository: registry.k8s.io/sig-storage/csi-resizer
      tag: v2.0.0

node:
  tolerations:
    - operator: Exists
  driver:
    image:
      repository: ghcr.io/serverscom/rbs-csi-driver
      tag: v0.1.4
      pullPolicy: Always
    resources:
      limits:
        memory: 200Mi
        cpu: 100m
      requests:
        memory: 100Mi
        cpu: 50m
  nodeDriverRegistrar:
    image:
      repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
      tag: v2.15.0
    resources:
      limits:
        memory: 100Mi
        cpu: 50m
      requests:
        memory: 50Mi
        cpu: 10m

# Optional managed StorageClasses. Each entry is rendered as a separate object.
# Name defaults to sc-rbs-<flavor(lower)>-<location(lower)> if not set.
storageClasses: []

# - flavor: "Performance"     # required; name ("SSD-High") or numeric ID ("16997")
#   location: "AMS7"          # required; name ("AMS1") or numeric ID ("40")
#   name: ""                  # optional; auto-generated from flavor and location if empty
#   isDefault: false
#   fsType: ""                # optional; ext4 (default), xfs, ext3
#   additionalLabels: {}      # labels on the StorageClass object
#   volumeLabels: {}          # labels applied to the RBS volume on provisioning
#     # managed-by: kubernetes
