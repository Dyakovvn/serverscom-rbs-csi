---
# Source: serverscom-rbs-csi/templates/node-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rbs-csi-node
  namespace: kube-system
  labels:
    app: rbs-csi-node
    app.kubernetes.io/name: serverscom-rbs-csi
spec:
  selector:
    matchLabels:
      app: rbs-csi-node
  template:
    metadata:
      labels:
        app: rbs-csi-node
        app.kubernetes.io/name: serverscom-rbs-csi
    spec:
      serviceAccountName: rbs-csi-node-sa
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.15.0
          args:
            - --v=2
            - --csi-address=$(ADDRESS)
            - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: /var/lib/kubelet/plugins/rbs.csi.servers.com/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi/
            - name: registration-dir
              mountPath: /registration/
          resources:
            limits:
              cpu: 50m
              memory: 100Mi
            requests:
              cpu: 10m
              memory: 50Mi
        - name: rbs-csi-driver
          image: ghcr.io/serverscom/rbs-csi-driver:v0.1.4
          imagePullPolicy: Always
          command:
            - /bin/rbs-csi-node
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
            allowPrivilegeEscalation: true
          args:
            - --endpoint=$(RBS_CSI_ENDPOINT)
            - --nodeid=$(RBS_CSI_NODE_ID)
          env:
            - name: RBS_CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: RBS_CSI_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: device-dir
              mountPath: /dev
            - name: iscsi-dir
              mountPath: /etc/iscsi
            - name: iscsi-run
              mountPath: /run
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 200Mi
            requests:
              cpu: 50m
              memory: 100Mi
      volumes:
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: DirectoryOrCreate
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/rbs.csi.servers.com/
            type: DirectoryOrCreate
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
        - name: iscsi-dir
          hostPath:
            path: /etc/iscsi
        - name: iscsi-run
          hostPath:
            path: /run
            type: Directory
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
