apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rbs-pvc-example 
  labels:
    app: nginx
    environment: production
    team: platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rbs-ssd-high-performance
  resources:
    requests:
      storage: 10Gi

---

apiVersion: v1
kind: Pod
metadata:
  name: rbs-test-pod
spec:
  containers:
    - name: test-container
      image: nginx:alpine
      volumeMounts:
        - name: rbs-volume
          mountPath: /data
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing RBS CSI Driver" > /data/test.txt
          cat /data/test.txt
          tail -f /dev/null
  volumes:
    - name: rbs-volume
      persistentVolumeClaim:
        claimName: rbs-pvc-example 
