---
name: sync-readme

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/sync-readme.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          path: main

      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy README and commit
        run: |
          set -euo pipefail
          cp main/README.md gh-pages/README.md
          cd gh-pages
          if git diff --quiet README.md; then
            echo "README.md already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: sync README from main"
          git push
