---
name: helm-release
on:
  push:
    tags:
      - helm-v*
jobs:
  helm-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Pin chart and image versions to tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Tag scheme: helm-vX.Y.Z -> chart version X.Y.Z, image tag vX.Y.Z
          # (the image tag must already be published by the goreleaser workflow).
          VERSION="${TAG#helm-v}"
          IMAGE_TAG="v${VERSION}"
          yq -i ".version = \"${VERSION}\" | .appVersion = \"${IMAGE_TAG}\"" \
            charts/serverscom-rbs-csi/Chart.yaml
          yq -i ".controller.driver.image.tag = \"${IMAGE_TAG}\" | .node.driver.image.tag = \"${IMAGE_TAG}\"" \
            charts/serverscom-rbs-csi/values.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          mark_as_latest: false
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
